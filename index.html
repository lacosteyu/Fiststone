<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳之岩 - Web 完整紀錄版</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { background-color: #2b2b2b; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .header { text-align: center; margin-bottom: 10px; }
        .controls { background: #3c3f41; padding: 15px; border-radius: 8px; display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        canvas { border: 4px solid #444; background-color: #2b2b2b; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .stats { font-size: 18px; font-weight: bold; color: #2ecc71; margin: 10px 0; }
        button, select { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; background: #3498db; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2980b9; transform: scale(1.05); }
        .btn-music { background: #9b59b6; }
        .btn-replay { background: #f1c40f; color: black; }
        
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }
        #btnStartGame {
            padding: 20px 40px; font-size: 24px; background: #2ecc71; color: white;
            border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 0 15px #2ecc71;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 style="color:white; margin-bottom:30px; font-size: 40px;">拳之岩 - 柴犬冒險</h1>
        <button id="btnStartGame">進入遊戲 (同步紀錄並啟動)</button>
        <p style="color:#888; margin-top:20px;">系統將自動載入您的 88 關通關紀錄</p>
    </div>

    <div class="header">
        <h1>拳之岩 - 柴犬冒險</h1>
        <div class="stats" id="stats">載入中...</div>
    </div>

    <div class="controls">
        <label>選擇關卡：</label>
        <select id="levelSelect"></select>
        <button id="btnReset">重玩 (S)</button>
        <button id="btnUndo">悔棋 (R)</button>
        <button id="btnReplay" class="btn-replay">觀看紀錄重播</button>
        <button id="btnMusic" class="btn-music">🎵 音樂：開啟</button>
    </div>

    <canvas id="gameCanvas" width="480" height="480"></canvas>

    <div style="margin-top: 15px; color: #888; font-size: 14px; text-align: center;">
        操作：[方向鍵] 移動 | [R] 悔棋 | [S] 重玩 | [Q] 停止重播
    </div>

    <py-config>
        terminal = false
        [[fetch]]
        files = ["levels.json", "fist_of_rock_records.json"]
    </py-config>

    <script type="py">
        import js
        import json
        import copy
        from pyodide.ffi import create_proxy

        RULES = {'a': 'r', 'r': 's', 's': 'a'}
        SOUND_MAP = {'a': 'PvsR', 'r': 'RvsS', 's': 'SvsP'}

        class WebFistOfRock:
            def __init__(self):
                self.canvas = js.document.getElementById("gameCanvas")
                self.ctx = self.canvas.getContext("2d")
                self.cell_size = 40
                self.current_level_idx = 0
                self.music_on = True
                self.is_replaying = False
                self.facing = "down"
                
                self.images = {}
                self.all_levels = []
                
                self.init_resources()
                self.load_data()
                self.reset_level()
                self.bind_events()

            def init_resources(self):
                img_list = {
                    'w': '02_Wall.png', 'k': '02_key.png', 'a': '02_Paper.png',
                    'r': '02_Rock.png', 's': '02_Scissor.png', 'h': '02_Home.png',
                    'p_down': '04_Player1.png', 'p_up': '04_Pu1.png', 
                    'p_left': '04_Pl1.png', 'p_right': '04_Pr1.png'
                }
                for key, path in img_list.items():
                    img = js.Image.new()
                    img.src = path
                    self.images[key] = img

                self.bgm = js.Audio.new("背景音樂.mp3")
                self.bgm.loop = True

            def play_sfx(self, name):
                if self.music_on:
                    sfx = js.Audio.new(f"{name}.mp3")
                    sfx.play()

            def load_data(self):
                # 1. 載入關卡
                with open("levels.json", "r") as f:
                    self.all_levels = json.load(f)
                
                # 2. 匯入紀錄到 localStorage 供 UI 使用
                try:
                    with open("fist_of_rock_records.json", "r") as f:
                        external_recs = json.load(f)
                        for lvl_key, data in external_recs.items():
                            js.localStorage.setItem(f"level_{lvl_key}", json.dumps(data))
                except:
                    pass

                # 3. 渲染選單標籤
                self.refresh_level_menu()

            def refresh_level_menu(self):
                select = js.document.getElementById("levelSelect")
                select.innerHTML = ""
                for i in range(len(self.all_levels)):
                    opt = js.document.createElement("option")
                    opt.value = str(i)
                    
                    # 檢查紀錄標記
                    data_str = js.localStorage.getItem(f"level_{i}")
                    if data_str:
                        rec = json.loads(data_str)
                        opt.text = f"第 {i+1} 關 [★ {rec.get('steps')}步 | {rec.get('time')}s]"
                    else:
                        opt.text = f"第 {i+1} 關"
                    select.add(opt)
                select.value = str(self.current_level_idx)

            def reset_level(self):
                level_data = self.all_levels[self.current_level_idx]
                self.grid = []
                for row in level_data:
                    r_list = list(row)
                    while len(r_list) < 12: r_list.append('w')
                    self.grid.append(r_list[:12])
                while len(self.grid) < 12: self.grid.append(['w']*12)
                
                self.history = []
                self.steps = 0
                self.move_history_keys = []
                self.is_replaying = False
                
                for y in range(12):
                    for x in range(12):
                        if self.grid[y][x] == 'p': self.px, self.py = x, y
                self.draw()

            def draw(self):
                self.ctx.clearRect(0, 0, 480, 480)
                for y in range(12):
                    for x in range(12):
                        char = self.grid[y][x]
                        x_pos, y_pos = x * self.cell_size, y * self.cell_size
                        self.ctx.strokeStyle = "#444"
                        self.ctx.strokeRect(x_pos, y_pos, self.cell_size, self.cell_size)
                        
                        if char == 'p':
                            self.ctx.drawImage(self.images[f'p_{self.facing}'], x_pos, y_pos, 40, 40)
                        elif char in self.images:
                            self.ctx.drawImage(self.images[char], x_pos, y_pos, 40, 40)
                
                js.document.getElementById("stats").innerHTML = f"第 {self.current_level_idx+1} 關 | 步數: {self.steps}"

            def move(self, dx, dy, direction_name):
                if self.is_replaying and direction_name not in ["Up", "Down", "Left", "Right"]: return
                
                self.facing = direction_name.lower()
                nx, ny = self.px + dx, self.py + dy
                
                if not (0 <= nx < 12 and 0 <= ny < 12) or self.grid[ny][nx] == 'w':
                    if not self.is_replaying: self.play_sfx("HitWall")
                    self.draw()
                    return

                old_state = (copy.deepcopy(self.grid), self.px, self.py, self.steps, self.facing)
                target = self.grid[ny][nx]

                if target in ['e', 'h']:
                    self.apply_move(nx, ny, old_state, direction_name)
                elif target in ['k', 'a', 'r', 's']:
                    nnx, nny = nx + dx, ny + dy
                    if 0 <= nnx < 12 and 0 <= nny < 12:
                        beyond = self.grid[nny][nnx]
                        can_push = False
                        if beyond == 'e' or (target == 'k' and beyond == 'h'):
                            can_push = True
                            if not self.is_replaying: self.play_sfx("MoveItem")
                        elif target in RULES and beyond == RULES[target]:
                            can_push = True
                            if not self.is_replaying: self.play_sfx(SOUND_MAP[target])
                        
                        if can_push:
                            if target == 'k' and beyond == 'h':
                                self.draw()
                                if not self.is_replaying:
                                    js.alert(f"完成關卡！步數：{self.steps+1}")
                                    self.save_record(self.steps+1)
                                    self.current_level_idx += 1
                                    self.refresh_level_menu()
                                    self.reset_level()
                                return
                            self.grid[nny][nnx] = target
                            self.grid[ny][nx] = 'e'
                            self.apply_move(nx, ny, old_state, direction_name)
                        else:
                            if not self.is_replaying: self.play_sfx("HitWall")
                self.draw()

            def apply_move(self, nx, ny, state, d_name):
                self.history.append(state)
                self.move_history_keys.append(d_name)
                self.grid[self.py][self.px] = 'e'
                self.px, self.py = nx, ny
                self.grid[ny][nx] = 'p'
                self.steps += 1

            def undo(self):
                if self.history:
                    self.grid, self.px, self.py, self.steps, self.facing = self.history.pop()
                    if self.move_history_keys: self.move_history_keys.pop()
                    self.draw()

            def save_record(self, steps):
                # 過關時存檔並更新 UI
                rec = {"steps": steps, "replay": self.move_history_keys, "time": "HandPlay"}
                js.localStorage.setItem(f"level_{self.current_level_idx}", json.dumps(rec))

            def start_auto_replay(self):
                data = js.localStorage.getItem(f"level_{self.current_level_idx}")
                if not data:
                    js.alert("無紀錄")
                    return
                
                replay_moves = json.loads(data)["replay"]
                self.reset_level()
                self.is_replaying = True
                
                def run_steps(idx):
                    if idx < len(replay_moves) and self.is_replaying:
                        move_name = replay_moves[idx]
                        dirs = {"Up":(0,-1),"Down":(0,1),"Left":(-1,0),"Right":(1,0)}
                        dx, dy = dirs[move_name]
                        self.move(dx, dy, move_name)
                        js.setTimeout(create_proxy(lambda: run_steps(idx + 1)), 250)
                    else:
                        self.is_replaying = False
                run_steps(0)

            def toggle_music(self, event=None):
                self.music_on = not self.music_on
                btn = js.document.getElementById("btnMusic")
                if self.music_on:
                    self.bgm.play()
                    btn.innerHTML = "🎵 音樂：開啟"; btn.style.background = "#9b59b6"
                else:
                    self.bgm.pause()
                    btn.innerHTML = "🔇 音樂：關閉"; btn.style.background = "#e74c3c"

            def bind_events(self):
                def start_game_clicked(event):
                    js.document.getElementById("startOverlay").style.display = "none"
                    if self.music_on: self.bgm.play()
                js.document.getElementById("btnStartGame").onclick = create_proxy(start_game_clicked)

                def on_key(event):
                    if event.key == "ArrowUp": self.move(0, -1, "Up")
                    elif event.key == "ArrowDown": self.move(0, 1, "Down")
                    elif event.key == "ArrowLeft": self.move(-1, 0, "Left")
                    elif event.key == "ArrowRight": self.move(1, 0, "Right")
                    elif event.key.lower() == "r": self.undo()
                    elif event.key.lower() == "s": self.reset_level()
                    elif event.key.lower() == "q": self.is_replaying = False
                js.window.addEventListener("keydown", create_proxy(on_key))

                js.document.getElementById("btnReset").onclick = create_proxy(lambda e: self.reset_level())
                js.document.getElementById("btnUndo").onclick = create_proxy(lambda e: self.undo())
                js.document.getElementById("btnMusic").onclick = create_proxy(self.toggle_music)
                js.document.getElementById("btnReplay").onclick = create_proxy(lambda e: self.start_auto_replay())
                
                def on_change(e):
                    self.current_level_idx = int(e.target.value)
                    self.reset_level()
                js.document.getElementById("levelSelect").onchange = create_proxy(on_change)

        game = WebFistOfRock()
    </script>
</body>
</html>

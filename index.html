<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拳之岩 - 掌機修復版</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { background-color: #2b2b2b; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; touch-action: manipulation; }
        .header h1 { font-size: 22px; margin: 5px 0; color: #eee; }
        
        .top-bar { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; max-width: 480px; justify-content: center; align-items: center; }
        
        canvas { border: 4px solid #444; background-color: #2b2b2b; width: 100%; max-width: 480px; height: auto; border-radius: 8px; }
        
        .stats { font-size: 18px; font-weight: bold; color: #2ecc71; margin: 10px 0; }

        .controller-panel { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            width: 100%; 
            max-width: 480px; 
            margin-top: 20px;
            background: rgba(60, 63, 65, 0.6);
            padding: 20px 0;
            border-radius: 20px;
        }

        .func-keys { display: flex; flex-direction: column; gap: 12px; }
        .btn-circle { 
            width: 65px; height: 65px; border-radius: 50%; border: none;
            color: white; font-weight: bold; font-size: 15px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px #1a1a1a;
        }
        .btn-circle:active { transform: translateY(2px); box-shadow: 0 2px #1a1a1a; }
        .bg-red { background: #e74c3c; }
        .bg-orange { background: #f39c12; }
        .bg-yellow { background: #f1c40f; color: black; }

        .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; }
        .joy-btn { 
            width: 70px; height: 70px; background: #555; border-radius: 15px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 30px; user-select: none; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px #333;
        }
        .joy-btn:active { background: #777; transform: translateY(2px); box-shadow: 0 2px #333; }
        .btn-up { grid-area: up; } .btn-down { grid-area: down; } 
        .btn-left { grid-area: left; } .btn-right { grid-area: right; }

        #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20, 20, 20, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #btnStartGame { padding: 20px 40px; font-size: 24px; background: #2ecc71; color: white; border-radius: 50px; border: none; font-weight: bold; }
        
        select { background: #444; color: white; border: 1px solid #666; padding: 6px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 style="color:white; margin-bottom:30px;">拳之岩</h1>
        <button id="btnStartGame">進入遊戲</button>
    </div>

    <div class="header">
        <h1>拳之岩 - 柴犬冒險</h1>
    </div>

    <div class="top-bar">
        <select id="levelSelect"></select>
        <button id="btnMusic" style="background:#9b59b6;">🎵 音樂：開</button>
    </div>

    <div class="stats" id="stats">載入中...</div>

    <canvas id="gameCanvas" width="480" height="480"></canvas>

    <div class="controller-panel">
        <div class="func-keys">
            <button id="btnReset" class="btn-circle bg-red">重玩</button>
            <button id="btnUndo" class="btn-circle bg-orange">悔棋</button>
            <button id="btnReplay" class="btn-circle bg-yellow">重播</button>
        </div>

        <div class="d-pad">
            <div class="joy-btn btn-up" id="padUp">▲</div>
            <div class="joy-btn btn-left" id="padLeft">◀</div>
            <div class="joy-btn btn-right" id="padRight">▶</div>
            <div class="joy-btn btn-down" id="padDown">▼</div>
        </div>
    </div>

    <py-config>
        terminal = false
        [[fetch]]
        files = ["levels.json", "fist_of_rock_records.json"]
    </py-config>

    <script type="py">
        import js
        import json
        import copy
        from pyodide.ffi import create_proxy

        RULES = {'a': 'r', 'r': 's', 's': 'a'}
        SOUND_MAP = {'a': 'PvsR', 'r': 'RvsS', 's': 'SvsP'}

        class WebFistOfRock:
            def __init__(self):
                self.canvas = js.document.getElementById("gameCanvas")
                self.ctx = self.canvas.getContext("2d")
                self.cell_size = 40
                self.current_level_idx = 0
                self.music_on = True
                self.is_replaying = False
                self.facing = "down"
                self.images = {}
                
                self.init_resources()
                self.load_data()
                self.reset_level()
                self.bind_events()

            def init_resources(self):
                img_list = {
                    'w': '02_Wall.png', 'k': '02_key.png', 'a': '02_Paper.png',
                    'r': '02_Rock.png', 's': '02_Scissor.png', 'h': '02_Home.png',
                    'p_down': '04_Player1.png', 'p_up': '04_Pu1.png', 
                    'p_left': '04_Pl1.png', 'p_right': '04_Pr1.png'
                }
                for key, path in img_list.items():
                    img = js.Image.new()
                    img.src = path
                    self.images[key] = img
                self.bgm = js.Audio.new("背景音樂.mp3")
                self.bgm.loop = True

            def toggle_music(self, event=None):
                self.music_on = not self.music_on
                btn = js.document.getElementById("btnMusic")
                if self.music_on:
                    self.bgm.play()
                    btn.innerHTML = "🎵 音樂：開"
                    btn.style.background = "#9b59b6"
                else:
                    self.bgm.pause()
                    btn.innerHTML = "🔇 音樂：關"
                    btn.style.background = "#e74c3c"

            def play_sfx(self, name):
                if self.music_on:
                    sfx = js.Audio.new(f"{name}.mp3")
                    sfx.play()

            def load_data(self):
                try:
                    with open("levels.json", "r") as f: self.all_levels = json.load(f)
                    with open("fist_of_rock_records.json", "r") as f:
                        ext_recs = json.load(f)
                        for k, v in ext_recs.items(): js.localStorage.setItem(f"level_{k}", json.dumps(v))
                except: pass
                self.refresh_level_menu()

            def refresh_level_menu(self):
                select = js.document.getElementById("levelSelect")
                select.innerHTML = ""
                for i in range(len(self.all_levels)):
                    opt = js.document.createElement("option")
                    opt.value = str(i)
                    data_str = js.localStorage.getItem(f"level_{i}")
                    opt.text = f"第 {i+1} 關" + (f" ★" if data_str else "")
                    select.add(opt)
                select.value = str(self.current_level_idx)

            def reset_level(self):
                level_data = self.all_levels[self.current_level_idx]
                self.grid = []
                for row in level_data:
                    r_list = list(row)
                    while len(r_list) < 12: r_list.append('w')
                    self.grid.append(r_list[:12])
                self.history = []; self.steps = 0; self.move_history_keys = []; self.is_replaying = False
                for y in range(12):
                    for x in range(12):
                        if self.grid[y][x] == 'p': self.px, self.py = x, y
                self.draw()

            def draw(self):
                self.ctx.clearRect(0, 0, 480, 480)
                for y in range(12):
                    for x in range(12):
                        char = self.grid[y][x]
                        x_pos, y_pos = x * self.cell_size, y * self.cell_size
                        self.ctx.strokeStyle = "#444"; self.ctx.strokeRect(x_pos, y_pos, self.cell_size, self.cell_size)
                        if char == 'p': self.ctx.drawImage(self.images[f'p_{self.facing}'], x_pos, y_pos, 40, 40)
                        elif char in self.images: self.ctx.drawImage(self.images[char], x_pos, y_pos, 40, 40)
                js.document.getElementById("stats").innerHTML = f"第 {self.current_level_idx+1} 關 | 步數: {self.steps}"

            def move(self, dx, dy, direction_name):
                if self.is_replaying and direction_name not in ["Up", "Down", "Left", "Right"]: return
                self.facing = direction_name.lower()
                nx, ny = self.px + dx, self.py + dy
                if not (0 <= nx < 12 and 0 <= ny < 12) or self.grid[ny][nx] == 'w':
                    if not self.is_replaying: self.play_sfx("HitWall")
                    self.draw(); return
                
                old_state = (copy.deepcopy(self.grid), self.px, self.py, self.steps, self.facing)
                target = self.grid[ny][nx]
                if target in ['e', 'h']:
                    self.apply_move(nx, ny, old_state, direction_name)
                elif target in ['k', 'a', 'r', 's']:
                    nnx, nny = nx + dx, ny + dy
                    if 0 <= nnx < 12 and 0 <= nny < 12:
                        beyond = self.grid[nny][nnx]
                        can_push = False
                        if beyond == 'e' or (target == 'k' and beyond == 'h'):
                            can_push = True
                            if not self.is_replaying: self.play_sfx("MoveItem")
                        elif target in RULES and beyond == RULES[target]:
                            can_push = True
                            if not self.is_replaying: self.play_sfx(SOUND_MAP[target])
                        if can_push:
                            if target == 'k' and beyond == 'h':
                                self.draw()
                                if not self.is_replaying:
                                    js.alert(f"通關！步數：{self.steps+1}")
                                    self.save_record(self.steps+1)
                                    self.current_level_idx += 1
                                    self.refresh_level_menu(); self.reset_level()
                                return
                            self.grid[nny][nnx] = target; self.grid[ny][nx] = 'e'
                            self.apply_move(nx, ny, old_state, direction_name)
                        else:
                            if not self.is_replaying: self.play_sfx("HitWall")
                self.draw()

            def apply_move(self, nx, ny, state, d_name):
                self.history.append(state); self.move_history_keys.append(d_name)
                self.grid[self.py][self.px] = 'e'; self.px, self.py = nx, ny
                self.grid[ny][nx] = 'p'; self.steps += 1

            def undo(self):
                if self.history:
                    self.grid, self.px, self.py, self.steps, self.facing = self.history.pop()
                    if self.move_history_keys: self.move_history_keys.pop()
                    self.draw()

            def save_record(self, steps):
                rec = {"steps": steps, "replay": self.move_history_keys, "time": "HandPlay"}
                js.localStorage.setItem(f"level_{self.current_level_idx}", json.dumps(rec))

            def start_auto_replay(self):
                data = js.localStorage.getItem(f"level_{self.current_level_idx}")
                if not data: return
                replay_moves = json.loads(data)["replay"]
                self.reset_level(); self.is_replaying = True
                def run_steps(idx):
                    if idx < len(replay_moves) and self.is_replaying:
                        m = replay_moves[idx]
                        dirs = {"Up":(0,-1),"Down":(0,1),"Left":(-1,0),"Right":(1,0)}
                        self.move(dirs[m][0], dirs[m][1], m)
                        js.setTimeout(create_proxy(lambda: run_steps(idx + 1)), 250)
                    else: self.is_replaying = False
                run_steps(0)

            def bind_events(self):
                # 啟動按鈕
                def start_game_clicked(event):
                    js.document.getElementById("startOverlay").style.display = "none"
                    if self.music_on:
                        self.bgm.play()
                js.document.getElementById("btnStartGame").onclick = create_proxy(start_game_clicked)
                
                # 音樂切換
                js.document.getElementById("btnMusic").onclick = create_proxy(self.toggle_music)

                # 鍵盤
                def on_key(e):
                    if e.key == "ArrowUp": self.move(0, -1, "Up")
                    elif e.key == "ArrowDown": self.move(0, 1, "Down")
                    elif e.key == "ArrowLeft": self.move(-1, 0, "Left")
                    elif e.key == "ArrowRight": self.move(1, 0, "Right")
                    elif e.key.lower() == "r": self.undo()
                    elif e.key.lower() == "s": self.reset_level()
                js.window.addEventListener("keydown", create_proxy(on_key))

                # 觸控
                js.document.getElementById("padUp").onclick = create_proxy(lambda e: self.move(0, -1, "Up"))
                js.document.getElementById("padDown").onclick = create_proxy(lambda e: self.move(0, 1, "Down"))
                js.document.getElementById("padLeft").onclick = create_proxy(lambda e: self.move(-1, 0, "Left"))
                js.document.getElementById("padRight").onclick = create_proxy(lambda e: self.move(1, 0, "Right"))
                js.document.getElementById("btnReset").onclick = create_proxy(lambda e: self.reset_level())
                js.document.getElementById("btnUndo").onclick = create_proxy(lambda e: self.undo())
                js.document.getElementById("btnReplay").onclick = create_proxy(lambda e: self.start_auto_replay())
                
                # 選單
                def on_change(e):
                    self.current_level_idx = int(e.target.value)
                    self.reset_level()
                js.document.getElementById("levelSelect").onchange = create_proxy(on_change)

        game = WebFistOfRock()
    </script>
</body>
</html>

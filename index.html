<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拳之岩 - 究極完整版</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { background-color: #2b2b2b; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; touch-action: manipulation; overflow-x: hidden; }
        .header h1 { font-size: 22px; margin: 5px 0; color: #eee; }
        .top-bar { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; max-width: 480px; justify-content: center; align-items: center; flex-wrap: wrap; }
        canvas { border: 4px solid #444; background-color: #2b2b2b; width: 100%; max-width: 480px; height: auto; border-radius: 8px; image-rendering: pixelated; }
        .stats { font-size: 18px; font-weight: bold; color: #2ecc71; margin: 10px 0; }
        .controller-panel { display: flex; justify-content: space-around; align-items: center; width: 100%; max-width: 480px; margin-top: 15px; background: rgba(60, 63, 65, 0.6); padding: 15px 0; border-radius: 20px; }
        .func-keys { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .btn-circle { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px #1a1a1a; }
        .btn-circle:active { transform: translateY(2px); box-shadow: 0 2px #1a1a1a; }
        .bg-red { background: #e74c3c; } .bg-orange { background: #f39c12; } .bg-yellow { background: #f1c40f; color: black; }
        .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; }
        .joy-btn { width: 70px; height: 70px; background: #555; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 30px; user-select: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 4px #333; }
        .joy-btn:active { background: #777; transform: translateY(2px); box-shadow: 0 2px #333; }
        .btn-up { grid-area: up; } .btn-down { grid-area: down; } .btn-left { grid-area: left; } .btn-right { grid-area: right; }
        #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #btnStartGame { padding: 20px 40px; font-size: 24px; background: #2ecc71; color: white; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; display: none; }
        select { background: #444; color: white; border: 1px solid #666; padding: 6px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 id="loadingText" style="color:white; margin-bottom:20px;">正在讀取 88 關資源...</h1>
        <button id="btnStartGame">進入遊戲</button>
    </div>

    <div class="header"><h1>拳之岩 - 柴犬冒險</h1></div>

    <div class="top-bar">
        <select id="levelSelect"></select>
        <div style="display:flex; align-items:center; gap:5px;">
            <label style="font-size:12px;">重播速度:</label>
            <select id="speedSelect">
                <option value="1">1x</option>
                <option value="2">2x</option>
                <option value="3">3x</option>
                <option value="4">4x</option>
                <option value="5">5x</option>
            </select>
        </div>
        <button id="btnMusic" style="background:#9b59b6;">🎵 音樂:開</button>
    </div>

    <div class="stats" id="stats">Ready...</div>
    <canvas id="gameCanvas" width="480" height="480"></canvas>

    <div class="controller-panel">
        <div class="func-keys">
            <button id="btnReset" class="btn-circle bg-red">重玩</button>
            <button id="btnUndo" class="btn-circle bg-orange">悔棋</button>
            <button id="btnReplay" class="btn-circle bg-yellow">重播</button>
        </div>
        <div class="d-pad">
            <div class="joy-btn btn-up" id="padUp">▲</div>
            <div class="joy-btn btn-left" id="padLeft">◀</div>
            <div class="joy-btn btn-right" id="padRight">▶</div>
            <div class="joy-btn btn-down" id="padDown">▼</div>
        </div>
    </div>

    <py-config>
        terminal = false
        [[fetch]]
        files = ["levels.json", "fist_of_rock_records.json"]
    </py-config>

    <script type="py">
        import js, json, copy, time
        from pyodide.ffi import create_proxy

        RULES = {'a': 'r', 'r': 's', 's': 'a'}
        SOUND_MAP = {'a': 'PvsR', 'r': 'RvsS', 's': 'SvsP'}

        class WebFistOfRock:
            def __init__(self):
                self.canvas = js.document.getElementById("gameCanvas")
                self.ctx = self.canvas.getContext("2d")
                self.cell_size = 40
                self.current_idx = 0
                self.music_on = True
                self.is_replaying = False
                self.facing = "down"
                self.images = {}
                self.all_levels = []
                self.load_resources()

            def load_resources(self):
                imgs = {'w':'02_Wall.png','k':'02_key.png','a':'02_Paper.png','r':'02_Rock.png','s':'02_Scissor.png','h':'02_Home.png','p_down':'04_Player1.png','p_up':'04_Pu1.png','p_left':'04_Pl1.png','p_right':'04_Pr1.png'}
                for k, v in imgs.items():
                    img = js.Image.new()
                    img.src = v
                    self.images[k] = img
                self.bgm = js.Audio.new("背景音樂.mp3")
                self.bgm.loop = True
                js.setTimeout(create_proxy(self.init_data), 600)

            def init_data(self):
                try:
                    with open("levels.json", "r") as f: self.all_levels = json.load(f)
                    with open("fist_of_rock_records.json", "r") as f:
                        recs = json.load(f)
                        for k, v in recs.items(): js.localStorage.setItem(f"level_{k}", json.dumps(v))
                except: pass
                self.refresh_menu(); self.reset_level(); self.bind_all_events()
                js.document.getElementById("loadingText").innerHTML = "資源讀取完成！"
                js.document.getElementById("btnStartGame").style.display = "block"

            def refresh_menu(self):
                sel = js.document.getElementById("levelSelect")
                sel.innerHTML = ""
                for i in range(len(self.all_levels)):
                    opt = js.document.createElement("option")
                    opt.value = str(i)
                    d_str = js.localStorage.getItem(f"level_{i}")
                    if d_str:
                        try:
                            rec = json.loads(d_str)
                            steps = rec.get("steps", "?")
                            t_val = rec.get("time", "?")
                            opt.text = f"第 {i+1} 關 [★ {steps}步 | {t_val}s]"
                        except:
                            opt.text = f"第 {i+1} 關 [★]"
                    else:
                        opt.text = f"第 {i+1} 關"
                    sel.add(opt)
                sel.value = str(self.current_idx)

            def reset_level(self):
                if not self.all_levels: return
                raw = self.all_levels[self.current_idx]
                self.grid = [list(r[:12]) for r in raw]
                while len(self.grid) < 12: self.grid.append(['w']*12)
                self.steps = 0; self.history = []; self.move_keys = []; self.is_replaying = False
                self.start_t = time.time()
                for y in range(12):
                    for x in range(12):
                        if self.grid[y][x] == 'p': self.px, self.py = x, y
                self.draw()

            def draw(self):
                self.ctx.clearRect(0, 0, 480, 480)
                raw = self.all_levels[self.current_idx]
                
                for y in range(12):
                    for x in range(12):
                        char = self.grid[y][x]
                        self.ctx.strokeStyle = "#444"; self.ctx.strokeRect(x*40, y*40, 40, 40)
                        
                        if y < len(raw) and x < len(raw[y]) and raw[y][x] == 'h':
                            self.ctx.drawImage(self.images['h'], x*40, y*40, 40, 40)

                        if char == 'p': 
                            self.ctx.drawImage(self.images[f'p_{self.facing}'], x*40, y*40, 40, 40)
                        elif char in self.images and char != 'h': 
                            self.ctx.drawImage(self.images[char], x*40, y*40, 40, 40)
                            
                js.document.getElementById("stats").innerHTML = f"關卡: {self.current_idx+1} | 步數: {self.steps}"

            def move(self, dx, dy, dname):
                if self.is_replaying and dname not in ["Up", "Down", "Left", "Right"]: return
                self.facing = dname.lower()
                nx, ny = self.px + dx, self.py + dy
                if not (0<=nx<12 and 0<=ny<12) or self.grid[ny][nx] == 'w':
                    if not self.is_replaying: self.play_sfx("HitWall")
                    self.draw(); return
                
                old = (copy.deepcopy(self.grid), self.px, self.py, self.steps, self.facing)
                target = self.grid[ny][nx]
                
                if target in ['e', 'h']:
                    self.grid[self.py][self.px] = 'e'; self.px, self.py = nx, ny
                    self.grid[ny][nx] = 'p'; self.history.append(old); self.move_keys.append(dname); self.steps += 1
                elif target in ['k', 'a', 'r', 's']:
                    nnx, nny = nx+dx, ny+dy
                    if 0<=nnx<12 and 0<=nny<12:
                        beyond = self.grid[nny][nnx]
                        can_push = False
                        if beyond == 'e' or (target == 'k' and beyond == 'h'):
                            can_push = True
                            if not self.is_replaying: self.play_sfx("MoveItem")
                        elif target in RULES and beyond == RULES[target]:
                            can_push = True
                            if not self.is_replaying: self.play_sfx(SOUND_MAP[target])
                        
                        if can_push:
                            if target == 'k' and beyond == 'h':
                                self.draw()
                                if not self.is_replaying:
                                    elapsed = round(time.time() - self.start_t, 1)
                                    js.alert(f"通關！步數：{self.steps+1}")
                                    rec = {"steps": self.steps+1, "time": str(elapsed), "replay": self.move_keys + [dname]}
                                    js.localStorage.setItem(f"level_{self.current_idx}", json.dumps(rec))
                                    self.current_idx += 1; self.refresh_menu(); self.reset_level()
                                return
                            self.grid[nny][nnx] = target; self.grid[ny][nx] = 'p'
                            self.grid[self.py][self.px] = 'e'; self.px, self.py = nx, ny
                            self.history.append(old); self.move_keys.append(dname); self.steps += 1
                        else:
                            if not self.is_replaying: self.play_sfx("HitWall")
                self.draw()

            def undo(self):
                if self.history:
                    state = self.history.pop(); self.move_keys.pop()
                    self.grid, self.px, self.py, self.steps, self.facing = state
                    self.draw()

            def play_sfx(self, name):
                if self.music_on:
                    s = js.Audio.new(f"{name}.mp3"); s.play()

            def toggle_music(self, event=None):
                self.music_on = not self.music_on
                btn = js.document.getElementById("btnMusic")
                if self.music_on:
                    self.bgm.play(); btn.innerHTML = "🎵 音樂:開"; btn.style.background = "#9b59b6"
                else:
                    self.bgm.pause(); btn.innerHTML = "🔇 音樂:關"; btn.style.background = "#e74c3c"

            def start_replay(self):
                d = js.localStorage.getItem(f"level_{self.current_idx}")
                if not d: 
                    js.alert("本關無紀錄")
                    return
                self.reset_level(); self.is_replaying = True
                moves = json.loads(d)["replay"]
                
                speed_val = int(js.document.getElementById("speedSelect").value)
                delay = 250 // speed_val

                def run(idx):
                    if idx < len(moves) and self.is_replaying:
                        m = moves[idx]
                        dirs = {"Up":(0,-1),"Down":(0,1),"Left":(-1,0),"Right":(1,0)}
                        self.move(dirs[m][0], dirs[m][1], m)
                        js.setTimeout(create_proxy(lambda: run(idx+1)), delay)
                    else: self.is_replaying = False
                run(0)

            def bind_all_events(self):
                js.document.getElementById("btnStartGame").onclick = create_proxy(lambda e: (js.document.getElementById("startOverlay").style.setProperty("display","none"), self.bgm.play()))
                
                def on_kd(e):
                    if self.is_replaying: return
                    dirs = {"ArrowUp":(0,-1,"Up"), "ArrowDown":(0,1,"Down"), "ArrowLeft":(-1,0,"Left"), "ArrowRight":(1,0,"Right")}
                    if e.key in dirs: self.move(dirs[e.key][0], dirs[e.key][1], dirs[e.key][2])
                    elif e.key.lower() == "r": self.undo()
                    elif e.key.lower() == "s": self.reset_level()
                    elif e.key.lower() == "q": self.is_replaying = False
                js.window.addEventListener("keydown", create_proxy(on_kd))

                js.document.getElementById("padUp").onclick = create_proxy(lambda e: self.move(0,-1,"Up"))
                js.document.getElementById("padDown").onclick = create_proxy(lambda e: self.move(0,1,"Down"))
                js.document.getElementById("padLeft").onclick = create_proxy(lambda e: self.move(-1,0,"Left"))
                js.document.getElementById("padRight").onclick = create_proxy(lambda e: self.move(1,0,"Right"))
                js.document.getElementById("btnReset").onclick = create_proxy(lambda e: self.reset_level())
                js.document.getElementById("btnUndo").onclick = create_proxy(lambda e: self.undo())
                js.document.getElementById("btnReplay").onclick = create_proxy(lambda e: self.start_replay())
                js.document.getElementById("btnMusic").onclick = create_proxy(self.toggle_music)
                js.document.getElementById("levelSelect").onchange = create_proxy(lambda e: (setattr(self, 'current_idx', int(e.target.value)), self.reset_level()))

        app = WebFistOfRock()
    </script>
</body>
</html>

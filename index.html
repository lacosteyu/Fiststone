<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拳之岩 - 強化啟動版</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { background-color: #2b2b2b; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin: 0; padding: 10px; }
        canvas { border: 4px solid #444; background: #2b2b2b; width: 100%; max-width: 400px; height: auto; border-radius: 8px; }
        .controller-panel { display: flex; justify-content: space-around; width: 100%; max-width: 480px; margin-top: 15px; background: rgba(60,63,65,0.6); padding: 15px; border-radius: 20px; }
        .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; }
        .joy-btn { width: 65px; height: 65px; background: #555; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 28px; box-shadow: 0 4px #333; }
        .joy-btn:active { background: #777; transform: translateY(2px); box-shadow: 0 2px #333; }
        .func-keys { display: flex; flex-direction: column; gap: 10px; }
        .btn-c { width: 60px; height: 60px; border-radius: 50%; border: none; color: white; font-weight: bold; }
        #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #btnStartGame { padding: 20px 40px; font-size: 22px; background: #2ecc71; color: white; border-radius: 50px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 id="loadingText">正在準備遊戲資源...</h1>
        <button id="btnStartGame" style="display:none;">進入遊戲</button>
    </div>

    <div style="margin: 10px; display: flex; gap: 10px;">
        <select id="levelSelect"></select>
        <button id="btnMusic" style="background:#9b59b6; border:none; color:white; border-radius:5px; padding:5px 10px;">🎵 音樂</button>
    </div>

    <div id="stats" style="color:#2ecc71; font-weight:bold; margin-bottom:5px;">載入中...</div>
    <canvas id="gameCanvas" width="480" height="480"></canvas>

    <div class="controller-panel">
        <div class="func-keys">
            <button id="btnReset" class="btn-c" style="background:#e74c3c;">重玩</button>
            <button id="btnUndo" class="btn-c" style="background:#f39c12;">悔棋</button>
            <button id="btnReplay" class="btn-c" style="background:#f1c40f; color:black;">重播</button>
        </div>
        <div class="d-pad">
            <div class="joy-btn" id="padUp" style="grid-area:up">▲</div>
            <div class="joy-btn" id="padLeft" style="grid-area:left">◀</div>
            <div class="joy-btn" id="padRight" style="grid-area:right">▶</div>
            <div class="joy-btn" id="padDown" style="grid-area:down">▼</div>
        </div>
    </div>

    <py-config>
        terminal = false
        [[fetch]]
        files = ["levels.json", "fist_of_rock_records.json"]
    </py-config>

    <script type="py">
        import js, json, copy, time
        from pyodide.ffi import create_proxy

        class App:
            def __init__(self):
                self.canvas = js.document.getElementById("gameCanvas")
                self.ctx = self.canvas.getContext("2d")
                self.current_idx = 0
                self.music_on = True
                self.facing = "down"
                self.images = {}
                self.all_levels = []
                self.is_replaying = False
                
                # 初始化資源
                self.load_resources()

            def load_resources(self):
                # 載入圖片
                imgs = {'w':'02_Wall.png','k':'02_key.png','a':'02_Paper.png','r':'02_Rock.png','s':'02_Scissor.png','h':'02_Home.png','p_down':'04_Player1.png','p_up':'04_Pu1.png','p_left':'04_Pl1.png','p_right':'04_Pr1.png'}
                for k, v in imgs.items():
                    self.images[k] = js.Image.new()
                    self.images[k].src = v
                
                self.bgm = js.Audio.new("背景音樂.mp3")
                self.bgm.loop = True

                # 延遲一點點讀取 JSON 確保 fetch 完成
                js.setTimeout(create_proxy(self.init_game_data), 500)

            def init_game_data(self):
                try:
                    with open("levels.json", "r") as f: self.all_levels = json.load(f)
                    with open("fist_of_rock_records.json", "r") as f:
                        recs = json.load(f)
                        for k, v in recs.items(): js.localStorage.setItem(f"level_{k}", json.dumps(v))
                except Exception as e:
                    js.console.log("JSON Load Warning: Using local storage only.")
                
                self.refresh_menu()
                self.start_level()
                
                # 顯示啟動按鈕
                js.document.getElementById("loadingText").innerHTML = "資源載入完成！"
                js.document.getElementById("btnStartGame").style.display = "block"

            def refresh_menu(self):
                sel = js.document.getElementById("levelSelect")
                sel.innerHTML = ""
                for i in range(len(self.all_levels)):
                    opt = js.document.createElement("option")
                    opt.value = str(i)
                    d = js.localStorage.getItem(f"level_{i}")
                    if d:
                        rec = json.loads(d)
                        opt.text = f"第 {i+1} 關 [★ {rec.get('steps')}步 | {rec.get('time')}s]"
                    else:
                        opt.text = f"第 {i+1} 關"
                    sel.add(opt)
                sel.value = str(self.current_idx)

            def start_level(self):
                raw = self.all_levels[self.current_idx]
                self.grid = [list(r[:12]) for r in raw]
                while len(self.grid) < 12: self.grid.append(['w']*12)
                self.steps = 0
                self.history = []
                self.move_keys = []
                self.start_t = time.time()
                for y in range(12):
                    for x in range(12):
                        if self.grid[y][x] == 'p': self.px, self.py = x, y
                self.draw()

            def draw(self):
                self.ctx.clearRect(0,0,480,480)
                for y in range(12):
                    for x in range(12):
                        c = self.grid[y][x]
                        self.ctx.strokeStyle = "#444"
                        self.ctx.strokeRect(x*40, y*40, 40, 40)
                        if c == 'p': self.ctx.drawImage(self.images[f'p_{self.facing}'], x*40, y*40, 40, 40)
                        elif c in self.images: self.ctx.drawImage(self.images[c], x*40, y*40, 40, 40)
                js.document.getElementById("stats").innerHTML = f"第 {self.current_idx+1} 關 | 步數: {self.steps}"

            def move(self, dx, dy, dname):
                if self.is_replaying and dname not in ["Up","Down","Left","Right"]: return
                nx, ny = self.px + dx, self.py + dy
                self.facing = dname.lower()
                if not(0<=nx<12 and 0<=ny<12) or self.grid[ny][nx]=='w': return
                
                old = (copy.deepcopy(self.grid), self.px, self.py, self.steps, self.facing)
                target = self.grid[ny][nx]
                
                if target in ['e', 'h']:
                    self.grid[self.py][self.px] = 'e'
                    self.px, self.py = nx, ny
                    self.grid[ny][nx] = 'p'
                    self.history.append(old); self.move_keys.append(dname); self.steps += 1
                elif target in ['k', 'a', 'r', 's']:
                    nnx, nny = nx+dx, ny+dy
                    if 0<=nnx<12 and 0<=nny<12:
                        beyond = self.grid[nny][nnx]
                        if beyond == 'e' or (target == 'k' and beyond == 'h'):
                            if target == 'k' and beyond == 'h':
                                elapsed = round(time.time()-self.start_t, 1)
                                js.alert(f"過關! 步數: {self.steps+1}")
                                rec = {"steps": self.steps+1, "time": str(elapsed), "replay": self.move_keys + [dname]}
                                js.localStorage.setItem(f"level_{self.current_idx}", json.dumps(rec))
                                self.current_idx += 1
                                self.refresh_menu(); self.start_level()
                                return
                            self.grid[nny][nnx] = target; self.grid[ny][nx] = 'p'
                            self.grid[self.py][self.px] = 'e'
                            self.px, self.py = nx, ny
                            self.history.append(old); self.move_keys.append(dname); self.steps += 1
                self.draw()

            def bind(self):
                js.document.getElementById("btnStartGame").onclick = create_proxy(lambda e: (js.document.getElementById("startOverlay").style.setProperty("display","none"), self.bgm.play()))
                js.document.getElementById("padUp").onclick = create_proxy(lambda e: self.move(0,-1,"Up"))
                js.document.getElementById("padDown").onclick = create_proxy(lambda e: self.move(0,1,"Down"))
                js.document.getElementById("padLeft").onclick = create_proxy(lambda e: self.move(-1,0,"Left"))
                js.document.getElementById("padRight").onclick = create_proxy(lambda e: self.move(1,0,"Right"))
                js.document.getElementById("btnReset").onclick = create_proxy(lambda e: self.start_level())
                js.document.getElementById("btnUndo").onclick = create_proxy(lambda e: (setattr(self, 'grid', self.history[-1][0]), setattr(self, 'px', self.history[-1][1]), setattr(self, 'py', self.history[-1][2]), setattr(self, 'steps', self.history[-1][3]), setattr(self, 'facing', self.history[-1][4]), self.history.pop(), self.move_keys.pop(), self.draw()) if self.history else None)
                js.document.getElementById("levelSelect").onchange = create_proxy(lambda e: (setattr(self, 'current_idx', int(e.target.value)), self.start_level()))

        game = App()
        game.bind()
    </script>
</body>
</html>
